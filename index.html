<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Double A Network - Modern recruitment platform. Find your dream job or hire top talent with our streamlined application process." />
  <meta name="theme-color" content="#667eea" />
  <title>Double A Network</title>
  <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Sarabun', sans-serif;
      background-color: #f8fafc;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      body {
        background-color: white;
      }

      .page-break {
        page-break-before: always;
      }
    }

    .print-only {
      display: none;
    }

    /* Smooth transitions */
    .form-step-enter {
      animation: slideUpFade 0.4s ease-out forwards;
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Custom scrollbar for sidebar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* ========== NEW PREMIUM ANIMATIONS ========== */

    /* Animated Gradient Background */
    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .animated-gradient {
      background: linear-gradient(-45deg, #667eea, #764ba2, #6B8DD6, #8E37D7);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    /* Floating Animation */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(3deg);
      }
    }

    @keyframes floatReverse {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
      }

      50% {
        transform: translateY(20px) rotate(-3deg);
      }
    }

    .float-slow {
      animation: float 8s ease-in-out infinite;
    }

    .float-medium {
      animation: floatReverse 6s ease-in-out infinite;
    }

    .float-fast {
      animation: float 4s ease-in-out infinite;
    }

    /* Pulse Glow */
    @keyframes pulseGlow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
      }

      50% {
        box-shadow: 0 0 40px rgba(99, 102, 241, 0.8);
      }
    }

    .pulse-glow {
      animation: pulseGlow 2s ease-in-out infinite;
    }

    /* Shimmer Effect */
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s infinite;
    }

    /* Card Hover Lift */
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-hover:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    /* Icon Bounce on Hover */
    .icon-bounce:hover .icon-inner {
      animation: iconBounce 0.5s ease;
    }

    @keyframes iconBounce {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    /* Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .glass-dark {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Gradient Border */
    .gradient-border {
      position: relative;
      background: white;
      border-radius: 1rem;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 1.125rem;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gradient-border:hover::before {
      opacity: 1;
    }

    /* Text Gradient */
    .text-gradient {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Badge Pulse */
    @keyframes badgePulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    .badge-pulse {
      animation: badgePulse 2s ease-in-out infinite;
    }

    /* Smooth appear */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .fade-in-up-delay-1 {
      animation: fadeInUp 0.8s ease-out 0.1s forwards;
      opacity: 0;
    }

    .fade-in-up-delay-2 {
      animation: fadeInUp 0.8s ease-out 0.2s forwards;
      opacity: 0;
    }

    .fade-in-up-delay-3 {
      animation: fadeInUp 0.8s ease-out 0.3s forwards;
      opacity: 0;
    }

    /* Button shine effect */
    .btn-shine {
      position: relative;
      overflow: hidden;
    }

    .btn-shine::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-shine:hover::after {
      left: 100%;
    }
  </style>
